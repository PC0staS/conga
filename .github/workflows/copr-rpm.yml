name: Build and publish to COPR

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        runs-on: ubuntu-latest
        container:
            image: fedora:latest

        steps:
            - uses: actions/checkout@v4

            - name: Install dependencies
              run: dnf install -y copr-cli rpm-build git

            - name: Setup COPR config
              run: |
                  mkdir -p ~/.config
                  cat > ~/.config/copr << EOF
                  [copr-cli]
                  login = ${{ secrets.COPR_LOGIN }}
                  username = ${{ secrets.COPR_USERNAME }}
                  token = ${{ secrets.COPR_TOKEN }}
                  copr_url = https://copr.fedorainfracloud.org
                  EOF

            - name: Get version
              run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

            - name: Create tarball
              run: |
                  git archive --format=tar.gz --prefix=conga-${{ env.VERSION }}/ HEAD -o conga-${{ env.VERSION }}.tar.gz

            - name: Build SRPM
              run: |
                  rpmbuild -bs conga.spec \
                    --define "_sourcedir $PWD" \
                    --define "_srcrpmdir $PWD" \
                    --define "version ${{ env.VERSION }}"

            - name: Submit to COPR
              run: copr-cli build conga *.src.rpm
