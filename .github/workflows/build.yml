name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger cuando haces push de un tag como v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          # Windows no soporta ARM64 fácilmente
          - goos: windows
            goarch: arm64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
      
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          OUTPUT_NAME=conga-${{ matrix.goos }}-${{ matrix.goarch }}
          
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi
          
          go build -ldflags "-X main.Version=${VERSION}" -o ${OUTPUT_NAME} ./...
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: conga-${{ matrix.goos }}-${{ matrix.goarch }}
          path: conga-${{ matrix.goos }}-${{ matrix.goarch }}*
  
  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: conga-*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}