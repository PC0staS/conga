name: conga
version: "1.0.0"
summary: Config generator CLI
description: |
  Build Nginx, Docker Compose, and WireGuard configs without the pain.

base: core22
confinement: strict

apps:
  conga:
    command: bin/conga
    plugs:
      - home
      - network

parts:
  conga:
    plugin: go
    source: .
    build-packages:
      - git
    build-snaps:
      - go
